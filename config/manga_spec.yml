technical_specifications:
  image_format: PNG
  
  # ===== 簡略化された生成指示 / Simplified Generation Instructions =====
  single_panel_generation:
    description: "1枚ずつ画像を生成（合計4枚）"
    canvas: "1000px × 1000px 正方形"
    
    # ----- 1枚目（タイトル付き）-----
    first_panel_with_title:
      instruction: |
        【1枚目の構成】
        - 上部: タイトルエリア（パステルカラー背景）
        - タイトルエリアの上下に境界線（細い線）を入れる
        - タイトル文字: 黒文字（#000000）＋白の袋文字（白アウトライン）
        - フォント: Noto Sans JP Black（大きめサイズ）
        - パステルカラーは作品ごとに変更可（固定色なし）
        - 水玉ドット柄は使用しない
        - 下部: 1コマ目の描画エリア
        - 全体を濃い茶色（#5D4037）の枠線で囲む
        - 白い余白で中央配置
      title_text: "コミュ障なイケメン"
      output_filename: "4koma_panel_01.png"
    
    # ----- 2〜4枚目（標準パネル）-----
    standard_panel:
      instruction: |
        【2〜4枚目の構成】
        - 中央に1コマ分の描画エリア
        - 濃い茶色（#5D4037）の枠線で囲む
        - 上下に白い余白
      output_filenames:
        - "4koma_panel_02.png"
        - "4koma_panel_03.png"
        - "4koma_panel_04.png"
    
    # ----- 共通ルール -----
    common_rules:
      - "1枚の画像に1コマのみ描画"
      - "枠線の色: 濃い茶色（#5D4037）"
      - "背景: 白（#FFFFFF）"
      - "余白やパディングのガイド線は表示しない"
    
    final_output:
      - "1枚目: タイトル + 起のコマ"
      - "2枚目: 承のコマ"
      - "3枚目: 転のコマ"
      - "4枚目: 結のコマ"
  
  four_panel_combined:
    description: 4コマ漫画を1枚にまとめる場合の仕様
    image_dimensions: 
      panel: 1365 x 768（16:11横長）
      title_with_panel: 1024 x 768以上（タイトル含む場合は縦に拡張）
    aspect_ratio: "16:11（各コマ）"
  
  expression_sheet_layout: グリッド形式（10表情パターン）
  outline_style: 茶系の輪郭線
  color_style: パステル調・低彩度
  background_style: 柔らかい色合いのシンプル背景

usage_notes:
  - 各キャラクターの表情バリエーションシートには10種類の表情が含まれています
  - 全キャラクター共通で茶系の輪郭線を使用し、統一感を持たせています
  - パステル調・低彩度の色使いで4コマ漫画らしい優しい雰囲気を実現
  - ディテールを控えめにし、シンプルで読みやすいデザイン
  - 表情の記号表現（赤面、涙、汗など）は統一されたスタイル
  - 背景は各表情に応じた柔らかい色合い
  - 男性キャラクター（まさと、ともや）は大人っぽい表情を重視
  - 女性キャラクター（はな、さき）は優しく親しみやすい表情
  - 4コマ漫画の最初には必ずタイトルパネルを配置
  - 起承転結の構成を意識したストーリー展開
  
