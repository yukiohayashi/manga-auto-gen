# ===================================
# AI生成指示（構造化）/ AI Generation Instructions (Structured)
# ===================================
generation_instructions:
  reference_priority:
    description: "参照優先順位を明確化"
    
    # ===== 生成物に関する明示的な禁止事項 =====
    explicit_prohibitions:
      description: "生成物に関する明示的な禁止事項"
      priority: "最優先（他のすべての指示に優先）"
      prohibited_elements:
        - "生成される漫画のタイトル、セリフ、モノローグ、および説明文（枠外）に、キャラクターの具体的な固有名詞（例：「はな」「さき」「まさと」「ともや」、またはこれらに類する名前）を一切含めないこと"
        - "キャラクターを特定する場合は、役割名（例：「友人」「彼氏」）を使用すること"
    
    # ===== スタイル（最優先） =====
    1_art_style:
      source_type: attached_file  # 添付ファイル
      filename: reference_4koma.jpg  # 参照スタイル画像
      priority: "最優先"
      specific_instructions:
        - "適度なディテールバランス（極端に簡略化しない）"
        - "セル影使用（フラットな影エリア、グラデーションなし）"
        - "髪は5-8個の定義された塊"
        - "目は瞳孔+2-3個のハイライト"
        - "顔に適度な影（頬骨、顎、鼻）"
        - "服に自然なしわと影"
      禁止事項:
        - "過度に簡略化しない"
        - "グラデーション使用禁止"
        - "ディテールを極端に削らない"
        - "背景の具体的な物体は避ける"
    
    # ===== キャラクター外見（条件付き） =====
    2_character_appearance:
      source: "character_sheets（表情シート）"
      priority: "中程度・部分的に参照"
      apply_to:
        - "顔の基本形状"
        - "髪型の基本形状"
        - "服装の基本デザイン"
      参照方法:
        - "顔の特徴（目の形、髪型、服装）のみ参照"
        - "描画スタイルは参照しない"
        - "簡略化して描画"
      注意事項:
        - "キャラクターシートの詳細な描写は真似ない"
        - "あくまで特徴の確認用"
        - "4コマ漫画風に簡略化して描く"
    
    # ===== セリフとストーリー =====
    3_dialogue_and_story:
      source_type: attached_file  # 添付ファイル
      filename: story_reference.jpg  # ストーリー参照画像
      priority: "高"
      apply_to:
        - "吹き出しのスタイル"
        - "テキストの配置"
        - "擬音語のスタイル"
      copy_exact: true
    
    # ===== 吹出しの色 =====
    4_speech_bubble_colors:
      source: "yml_specifications"
      priority: "中"
      reference_section: "text_and_dialogue.speech_bubbles.color_patterns"

project_info:
  title: "コミュ障なイケメン"  # 今回の4コマタイトル
  purpose: "恋愛コメディ4コマ漫画"
  art_style: "4コマ漫画スタイル（パステル調・低彩度・セル塗り）"
  sheet_format: 表情バリエーショングリッド（10表情パターン）

style_references:
  primary_style_reference:
    source_type: "attached_file"
    filename: "reference_4koma.png"  # 参照したい画像に合わせて変更してください
    description: "この添付ファイルのスタイルを完全に再現すること"
    key_characteristics:
      - "適度なディテールバランス"
      # （以下、そのまま）
  
  successful_generation_example:
    source_type: "attached_file"
    filename: "successful_panel_4.png" # こちらも参照画像があればファイル名に変更
    description: "このクオリティを目指す"
    style_notes:
      # （以下、そのまま）


# ===================================
# 4コマ漫画制作ルール
# ===================================
four_panel_manga_rules:
  title_panel:
    position: 一番最初（4コマの前）
    description: タイトルパネルを4コマ漫画の最初に配置
    format: 
      - タイトルテキストを含む専用パネル
      - 16:11の横長フォーマットの上部にタイトルエリアを追加
      - 全体の高さは16:11より広がる
    example_title: "コミュ障なイケメン"
  
  panel_assignment:
    format: 4コマ構成
    aspect_ratio: "16:11（横長）"
    
    panel_structure:
      - panel_number: 1
        name: 起
        description: "はなが友人のさきに「彼氏がコミュ障で困っている」と相談する導入"
        focus_characters: "はな、さき"
        mood_and_effects: "困惑、ピンク系背景"
        
      - panel_number: 2
        name: 承
        description: "さきが「どんな風にコミュ障なの？」と聴く、はなが具体例を話す"
        focus_characters: "はな、さき"
        mood_and_effects: "会話シーン、日常的な雰囲気"
        
      - panel_number: 3
        name: 転
        description: "はなが「でもイケメンだから許せる」と照れながら言う"
        focus_characters: "はな"
        mood_and_effects: "照れ、ハートマーク、ピンク背景"
        
      - panel_number: 4
        name: 結
        description: "さきが「それ、ただの惚気でしょ」とツッコミを入れるオチ"
        focus_characters: "はな、さき"
        mood_and_effects: "ショック、集中線、コメディオチ"

    main_characters:
      - はな（主人公・25歳女性）
      - まさと（彼氏・28歳男性）
    
    supporting_characters:
      - さき（友人・25歳女性）
      - ともや（友人・25歳男性）
    
    panel_allocation:
      - "1コマ目: 主人公（はな）の心情や状況を中心に"
      - "2コマ目: 主人公と相手（まさと、さき等）の対話"
      - "3コマ目: 主人公のリアクション（感情の爆発）"
      - "4コマ目: 相手の回答と主人公のリアクション（オチ）"
  
  expression_selection:
    panel_1_expressions:
      - 心配
      - 困惑
      - 通常（不安げ）
    
    panel_2_expressions:
      - 照れ
      - 心配
      - 困惑
    
    panel_3_expressions:
      - 驚き
      - 怒り（自分に対して）
      - 困惑（強調）
    
    panel_4_expressions:
      - 驚き
      - 喜び
      - 照れ
  
  scene_composition:
    panel_1:
      foreground: 主人公（大きく）
      background: 他のキャラクター（小さく）
      focus: 主人公の心情
    
    panel_2:
      layout: 2人の対話シーン
      positioning: 左右に配置
      focus: 会話内容
    
    panel_3:
      composition: クローズアップ
      focus: 主人公の顔（感情表現）
      background: シンプルまたは効果線
    
    panel_4:
      layout: 2人の最終リアクション
      positioning: 左右に配置
      focus: オチとリアクション
      background: ドラマティックな効果

  text_and_dialogue:
    speech_bubbles:
      # ===== 吹き出し仕様（v1.5確定版） =====
      # 参照画像: patternC_panel_03.png / drawl_f_panel_02.png / diet_panel_04_v4.png
      #
      # 【キャラ別吹き出し色ルール（確定）】
      #   はな（主人公・女性）  → 黄色 #FFE800（高彩度）
      #   さき（友人・女性）    → 黄色 #FFE800 または白
      #   まさと（彼氏・男性）  → パステルブルー #D4E8FF または白
      #   ともや（友人・男性）  → パステルブルー #D4E8FF または白
      #   モノローグ・小声     → 白 #FFFFFF
      #
      # 【強調文字ルール（確定）】
      #   ツッコミや感情爆発の吹き出しでは、キーワードを赤文字・他より大きいサイズで表示
      #   例: 「枕かーい！！」→「枕」を赤・大きめ、「かーい！！」を黒・標準サイズ
      #
      # 【形状ルール（確定）】
      #   黄色吹き出し: 角ばった多角形（六角形・ダイヤ形ベース）。丸みは禁止。
      #   青/白吹き出し: 角ばった多角形または楕円形（柔らかめOK）
      #   ツッコミ吹き出し: ギザギザ爆発型（黄色）
      
      color_patterns:
        yellow:
          hex_code: "#FFE800"  # 高彩度の純黄色。#FFEB3Bやパステル黄は使用禁止。
          rgb: "255, 232, 0"
          usage: はな・さきの主要セリフ、感情表現、ツッコミ
          characters: はな（主人公）、さき（友人）
          shape: "角ばった多角形（六角形・ダイヤ形ベース）。丸みは絶対禁止。角が立っていること。"
          text_colors:
            primary: "#000000"  # 黒（通常テキスト）
            emphasis: "#FF0000"  # 赤（強調キーワード・ツッコミの核心語）
          font_instruction: "黒文字=Noto Sans JP Black、赤強調語=M PLUS Rounded 1c ExtraBold（赤は他より1.2〜1.5倍大きく）"
          emphasis_rule: "ツッコミや感情爆発では核心キーワードを赤・大きめにする。例: 『枕かーい！！』→『枕』赤大、『かーい！！』黒標準"
        
        pink:
          hex_code: "#FF80C0"  # 高彩度ピンク。パステルピンクは使用禁止。
          rgb: "255, 128, 192"
          usage: はなの恋愛・照れシーン限定
          characters: はな（恋愛・照れシーンのみ）
          shape: "角ばった多角形またはハート形。丸みは最小限。"
          text_colors:
            primary: "#000000"
            emphasis: "#FF0000"
        
        light_blue:
          hex_code: "#D4E8FF"  # パステルブルー（男性キャラ専用）
          rgb: "212, 232, 255"
          usage: まさと・ともやの通常セリフ。クールで落ち着いた発言。
          characters: まさと（彼氏）、ともや（友人）
          shape: "角ばった多角形または楕円形（柔らかめOK）"
          text_colors:
            primary: "#000000"
            emphasis: "#FF0000"
          note: "男性キャラはパステルブルーまたは白。高彩度ブルーは使用禁止。"
        
        white:
          hex_code: "#FFFFFF"
          rgb: "255, 255, 255"
          usage: モノローグ、小声、ニュートラルな発言、全キャラ共通の補助吹き出し
          characters: 全キャラクター共通
          shape: "楕円形または角丸四角形"
          text_colors:
            primary: "#000000"
      
      outline:
        color: "#000000"
        weight: "太め（視認性重視）"
        style: "直線的・角ばった輪郭（黄色吹き出しは特に角を立てること）"
      
      shape_variations:
        - "角ばった多角形（黄色吹き出し・主要セリフ）← 最重要。丸みは禁止"
        - "ギザギザ爆発型（ツッコミ・感情爆発・黄色）"
        - "角ばった多角形または楕円形（青/白吹き出し・男性キャラ）"
        - "雲型吹き出し（考え事・モノローグ）"
        - "楕円形（小声・つぶやき・白吹き出しのみ）"
      
      prohibited:
        - "黄色吹き出しのパステル化・くすみ化（#FFE800より薄い黄色は禁止）"
        - "黄色吹き出しに#FFEB3Bやパステル黄色を使用すること"
        - "黄色吹き出しの過度な丸み（角ばった形状を必ず維持）"
        - "黄色吹き出し内のテキストに黒・赤以外の色を使用すること"
        - "男性キャラ（まさと・ともや）に高彩度ブルーを使用すること"
        - "ツッコミ・感情爆発の核心キーワードを赤・大きめにしないこと"
    
    text_boxes:
      - 説明文用（黒文字・白背景）
      - 強調用（白文字・赤背景）
      - 注釈用（小さな文字・白背景）
    
    text_style:
      # ===== フォント仕様（AI画像生成・手動編集共通） =====
      fonts:
        - usage: "吹き出し本文・タイトル・大見出し（すべて共通）"
          font: "Noto Sans JP Black"
          download: "https://fonts.google.com/noto/specimen/Noto+Sans+JP"
          license: "SIL Open Font License 1.1（商用無料）"
          note: "AI生成プロンプト指定と同一フォント。1本で本文・タイトル両用可能。"
        
        - usage: "強調・赤字・ツッコミ・感情表現"
          font: "M PLUS Rounded 1c ExtraBold"
          download: "https://fonts.google.com/specimen/M+PLUS+Rounded+1c"
          license: "SIL Open Font License 1.1（商用無料）"
          note: "角が丸く感情表現に最適。AI生成プロンプト指定および手動修正時に使用。"
      
      sound_effects:
        placement: 背景やアクションの近く
        
        examples:
          - "ドキドキ"（心臓の音）
          - "ガーン"（ショック）
          - "キラキラ"（輝き）
          - "ズーン"（落ち込み）
          - "ワイワイ"（賑やか）
          - "シーン"（静寂）
    
    text_placement:
      - セリフは吹き出し内に配置
      - モノローグは枠外または背景に配置
      - 擬音語は効果的に配置
      - 文字の大きさや太さで感情を表現
    
    background_effects:
      - シンプルな効果線（集中線、スピード線）
      - ドットパターン（感情表現）
      - 柔らかいグラデーション背景
    
    speech_bubble_placement:
      - 吹き出しはキャラクターの近くに配置
      - 吹き出しの向きはキャラクターの向きに合わせる
      - 吹き出しの色はキャラクターや感情に応じて選択
    
  background_effects:
    panel_1:
      color: ピンク系
      effect: 放射状の集中線
      mood: 不安・心配
    
    panel_2:
      color: 薄ピンク・白
      effect: シンプル、装飾的要素（ハート、汗マーク）
      mood: 日常・会話
    
    panel_3:
      color: ピンク系（強調）
      effect: 強い集中線
      mood: 感情の爆発
    
    panel_4:
      color: 黒または暗色
      effect: ドラマティックな集中線、ショック効果
      mood: オチ・驚き

visual_style_guide:
  overall_style: "日本の4コマ漫画スタイル（適度なディテール）"
  
  detail_level:
    hair_rendering: "5-8個の定義された塊、セル影"
    eye_rendering: "定義された瞳孔とハイライト2-3個"
  
  facial_features:
    nose: "小さな点または簡略化された線"
    mouth: "定義された線（表情に応じて変化）"
    shadows: "頬骨、顎下、鼻の影を適度に表現"
  
  clothing_details:
    style: "自然なしわと影"
    wrinkles: "適度な線（極端に省略しない）"
    patterns: "明確に表現（ストライプなど）"
    texture: "基本的な質感表現"
  
  # シェーディング技法（統合）/ Shading Technique
  shading_technique:
    method: "セル影中心（定義された影エリア）"  # セル影中心
    shadow_style: "単色のフラットな影（グラデーションなし）"  # フラットな影
    shadow_color: "元色を暗くした単色"  # 影の色
    shadow_intensity: "中程度"  # 影の強さ
    shadow_placement: "顔、髪、服に適度に配置"  # 影の配置
    gradient_prohibition: true  # グラデーション禁止
    cel_shading: true  # セル影使用

  expression_symbols:
    style: "シンプルで典型的な漫画記号"
    
    blush:
      type: "シンプルなピンクの斜線または円形"
      style: "フラットカラー、グラデーションなし"
    
    tears:
      type: "シンプルな涙型の滴"
      style: "単色、透明感は最小限"
    
    sweat:
      type: "シンプルな涙型の小さな滴"
      style: "単色"
  
  # 背景スタイル（統合）/ Background Style
  background:
    priority: "背景は最小限・抽象的に"  # 背景優先度
    overall_feel: "平面的で抽象的、漫画的な雰囲気"  # 全体的な印象
    
    default_style:
      type: "効果線中心"  # デフォルトタイプ
      complexity: "極めてシンプル"  # 複雑さ
      
    allowed_backgrounds:  # 許可される背景
      - "単色背景（パステルカラー）"
      - "集中線（放射状）"
      - "スピード線（斜め）"
      - "ドットパターン（ハーフトーン）"
      - "シンプルなグラデーション（2色まで）"
    
    prohibited_backgrounds:  # 禁止される背景
      - "具体的な家具・小物"
      - "窓・ドア・壁などの詳細"
      - "観葉植物などの装飾"
      - "背景ボケ効果"
      - "遠近法を使った奥行き表現"
      - "写実的な背景描写"
    
    effect_lines:  # 効果線
      usage: "頻繁に使用"
      types:
        - "集中線（感情の強調）"
        - "スピード線（動き・緊張感）"
        - "斜線ハッチング（重い雰囲気）"
      color: "単色（黒、濃い茶、ピンクなど）"

  # ===== 4コマ漫画特有のスタイル指定 =====
  manga_specific_style:
    character_rendering:
      face_size: "やや大きめ（感情表現を重視）"
      body_proportions: "やや頭身低め（6-7頭身程度）"
      line_consistency: "均一な線の太さ"
      
    emotional_expression:
      emphasis: "表情を最大限に強調"
      symbols: "典型的な漫画記号を積極的に使用"
      exaggeration: "感情表現は誇張してOK"
    
    composition:
      focus: "キャラクターと吹き出しに集中"
      background: "補助的な役割のみ"
      clarity: "一目で状況が分かるシンプルさ"

