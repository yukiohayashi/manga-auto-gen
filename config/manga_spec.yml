  recommended_usage:
    - 4コマ漫画制作時の表情参考として使用
    - キャラクターの感情表現の一貫性を保つためのガイド
    - AI画像生成時の参照画像として活用
    - アニメーション制作時の表情設計の基準
    - 起承転結の構成に基づいたストーリー展開
  
  tips:
    - 各キャラクターの個性を保ちながら表情を使い分ける
    - シーンに応じて適切な表情を選択
    - 同じ感情でもキャラクターによって表現方法が異なることに注意
    - 男性キャラは控えめで大人っぽい表情を重視
    - 女性キャラは豊かな表情表現が可能
    - タイトルパネルは必ず最初に配置
    - 4コマ全体の流れを意識した表情選択

# ===================================
# キャラクター名ルール
# ===================================
character_name_rules:
  protagonist:
    name: "はな"
    note: "主人公名は『はな』を使用すること"

# ===================================
# プリフライトチェック（画像生成前必須確認）
# ===================================
preflight_check:
  description: |
    【重要】画像生成を開始する前に、必ず以下のSTEPをすべて実行すること。
    確認が完了するまで画像生成ツールを呼び出してはならない。
    実行コマンド: python3 /home/ubuntu/upload/preflight_check.py --story "ストーリー名"

  # ===== STEP 1: manga_spec.yml の仕様確認 =====
  step1_spec_check:
    label: "manga_spec.yml 仕様確認"
    mandatory: true
    items:
      - id: canvas_size
        check: "technical_specifications.single_panel_generation.canvas"
        required_value: "1000px × 1000px 正方形"
        error_if_wrong: "正方形でない画像を生成してはならない"

      - id: bubble_yellow
        check: "text_and_dialogue.speech_bubbles.color_patterns.yellow"
        required_value: "#FFE800 高彩度・角ばった多角形・丸み禁止"
        error_if_wrong: "パステル黄（#FFEB3B等）や丸い吹き出しは禁止"

      - id: bubble_blue
        check: "text_and_dialogue.speech_bubbles.color_patterns.light_blue"
        required_value: "#D4E8FF パステルブルーまたは白（男性キャラ専用）"
        error_if_wrong: "高彩度ブルーは禁止"

      - id: emphasis_text
        check: "text_and_dialogue.speech_bubbles.color_patterns.yellow.emphasis_rule"
        required_value: "ツッコミ核心語=赤文字・1.2〜1.5倍大きく"
        error_if_wrong: "核心語を赤・大きめにしないことは禁止"

      - id: font
        check: "text_and_dialogue.text_style.fonts"
        required_value: "Noto Sans JP Black / M PLUS Rounded 1c ExtraBold のみ"
        error_if_wrong: "他のフォントを使用してはならない"

      - id: character_name
        check: "character_name_rules.protagonist"
        required_value: "主人公名は『はな』"
        error_if_wrong: "主人公名は『はな』を使用すること"

      - id: no_proper_nouns
        check: "generation_instructions.explicit_prohibitions"
        required_value: "セリフ・タイトル・モノローグにキャラ固有名詞を含めない"
        error_if_wrong: "キャラ名をセリフ内に入れてはならない"

  # ===== STEP 2: Google Drive 素材確認 =====
  step2_drive_check:
    label: "Google Drive 素材確認"
    mandatory: true
    folder_location: "Google Drive > マイMac > manga-auto-gen > [ストーリー名]"
    instruction: |
      必ず以下のコマンドでDriveを検索し、素材ファイルの有無を確認すること:
        gws drive files list --params '{"q": "name=\"[ストーリー名]\" and mimeType=\"application/vnd.google-apps.folder\" and trashed=false"}'
      フォルダが見つかった場合:
        → フォルダ内のファイル一覧を取得し、4コマ分のPNGが揃っているか確認する
        → 既存素材を参照・リメイク元として使用する
      フォルダが見つからない場合:
        → 新規ストーリーとして新規生成を進める
    error_if_skipped: "Drive確認をスキップして画像生成を開始してはならない"

  # ===== STEP 3: Instagram投稿文の準備確認 =====
  step3_instagram:
    label: "Instagram投稿文の準備"
    mandatory: true
    instruction: |
      4コマ漫画の生成完了後、必ずInstagram投稿文（CTA付き）を作成すること。
      テンプレート参照: /home/ubuntu/instagram_marketing_strategy.md
      投稿文には以下を含めること:
        1. 共感フック（1行目）
        2. 漫画のあらすじ（オチは言わない）
        3. 問いかけCTA（2択・絵文字・経験談など）
        4. ハナシテ定型文・プロフィール誘導
        5. ハッシュタグ（#4コマ漫画 #恋愛漫画 #恋愛悩み 等）
    error_if_skipped: "投稿文なしで納品してはならない"

# ===================================
# Google Drive 同期ルール（必須遵守）
# ===================================
google_drive_sync:
  description: |
    「失敗の原因」
    2026-04-02に発生した同期失敗の原因：
      1. 初回のアップロード時に parents フィールドを指定せず、Driveのルート直下（マイドライブ）にアップロードされた。
      2. ファイルIDを取得したものの、そのファイルが正しいフォルダ内にあるか確認しなかった。
      3. 「files list」で同名ファイルを検索した際、フォルダ外のファイルがヒットしたため誤ったファイルIDを使用してしまった。
  
  # ===== 正しい同期先（必ずここを参照すること）=====
  correct_folder:
    name: "manga-auto-gen"
    folder_id: "1InxhF6u1ToFBTsnfMeJ1xIW3ibNynUq_"
    path: "パソコン > マイ Mac > manga-auto-gen"
    note: "Driveには同名のmanga-auto-genフォルダが2つ存在する。必ず上記IDを使用すること。"
  
  # ===== 登録済みファイルインデックス（更新時は必ずここのIDを使用）=====
  registered_files:
    - name: "manga_spec.yml"
      file_id: "1oET1V34HPCDcgxqRzpXZ5ZSA9fO5WsxH"
      operation: update
    - name: "hana.png"
      file_id: "1Szs4wPmo_-en3iWlo4XlfkOJPTmAV_y2"
      operation: update
    - name: "saki.png"
      file_id: "1FUdszNEBTNWclsuy1g8PxACqQC2FijQo"
      operation: update
    - name: "masato.png"
      file_id: "1ooIUb1iYOZBAHowkjPwMBGy08EmblyKn"
      operation: update
    - name: "tomoya.png"
      file_id: "1gt4a9_wbPYcVfjj4GDXaknnekiYMfuf8"
      operation: update
    - name: "yota.png"
      file_id: "1Vg_ZvcbdwUxTH9CcnAZ4OT4zVlPWPeaE"
      operation: update
    - name: "reference_4koma.png"
      file_id: "1rh-477oeOOEuFmvIoZ0WKrd4uKdNuGxx"
      operation: update
    - name: "successful_panel_4.png"
      file_id: "1fnSNJ3u7PbdBHspYpYMLiy3mjPnhMDTj"
      operation: update
    - name: "preflight_check.py"
      file_id: "1DXrInNDgPgV8DAA8Rr6nqdlcavWMDa5t"
      operation: update
  
  # ===== 必須遵守ルール =====
  mandatory_rules:
    - id: always_use_folder_id
      rule: "新規ファイルをアップロードする際は必ず parents に folder_id（1InxhF6u1ToFBTsnfMeJ1xIW3ibNynUq_）を指定すること"
      command_example: "gws drive files create --upload <file> --json '{\"name\": \"<filename>\", \"parents\": [\"1InxhF6u1ToFBTsnfMeJ1xIW3ibNynUq_\"]}'"
      error_if_wrong: "parents未指定の場合、マイドライブルートに保存されるため絶対禁止"
    
    - id: use_registered_file_id_for_update
      rule: "既存ファイルを更新する際は必ず registered_files の file_id を使用すること。files listで再検索しないこと（誤ったファイルIDを取得するリスクがある）"
      error_if_wrong: "files listで同名ファイルを検索すると、フォルダ外の同名ファイルがヒットする危険がある"
    
    - id: verify_after_upload
      rule: "アップロード後は必ず以下コマンドでフォルダ内に存在するか確認すること"
      command_example: "gws drive files list --params '{\"q\": \"\\\"1InxhF6u1ToFBTsnfMeJ1xIW3ibNynUq_\\\" in parents and name=\\\"<filename>\\\" and trashed=false\"}'"
      error_if_wrong: "確認をスキップすると同期失敗を検知できない"
    
    - id: new_character_sheet_registration
      rule: "新キャラクターシートを作成した際は、Driveアップロード後に必ず registered_files に file_id を追記すること"
      error_if_wrong: "登録済みインデックスがないと次回以降の更新時に誤ったファイルIDを使用するリスクがある"

