name: 婚活スラッガー（プリセット済み）
description: 「婚活スラッガー」のシナリオが入力済みのテンプレートです。そのまま送信できます。
title: "[生成リクエスト]: 婚活スラッガー"
labels: ["manga-generation"]
body:
  - type: input
    id: story_title
    attributes:
      label: 【必須】漫画のタイトル（Driveのフォルダ名になります）
      description: Google Driveの保存先フォルダ名として使用されます。
      placeholder: 婚活スラッガー
      value: 婚活スラッガー
    validations:
      required: true

  - type: textarea
    id: theme_prompt
    attributes:
      label: 【必須】本日のテーマやシナリオ指示
      description: どのようなお話にしたいか、ざっくりとしたテーマや指示を書いてください。
      value: |
        マッチングアプリで男たちが敬遠していく主人公
        野球の例えで弟がツッコミを入れる展開
        主人公の極端なアプローチが原因だったというオチ（ドラフランケン D→F）
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: twist_pattern
    attributes:
      label: 【任意】どんでん返しパターンの指定
      description: PlotTwistガイドの法則から指定する場合は選択してください。
      default: 4
      options:
        - おまかせ（自動選択）
        - ドラキュラ2世 (D→D'継承)
        - ドラキュラの影 (D→D'誤認)
        - ドラウルフ (D→W)
        - ドラフランケン (D→F)
        - ウルフドラキュラ (W→D)
        - ウルフフランケン (W→F)
        - フランケンドラキュラ (F→D)
        - フランケンウルフ (F→W)
        - ゾンビ (∅→○)
        - ドラゴンの卵 (遠→近)
    validations:
      required: false

  - type: textarea
    id: scenario_detail
    attributes:
      label: 【任意】詳細シナリオ（4コマの起承転結を直接指定する場合）
      description: |
        練り上げた4コマの起承転結、セリフ、表情指定などがあればここにペーストしてください。
        枠の右下を引っ張ることで、さらに広くゆとりを持って表示できます。
      value: |
        採用パターン：ドラフランケン（D→F）
        起点（D：ドラキュラ）： 男たちが勝負してくれない（アプリの男たちが悪い）という思い込み。
        どんでん返し先（F：フランケン）： 自分の極端なアプローチ（行動）が男たちを恐怖させていたという自業自得。

        【1コマ目：起】
        登場人物： はな
        描写： スマホを見てイライラしているはな。
        吹き出し1:
          type: shout
          character: はな
          text: 「なんで私とマッチングした男、すぐフェードアウト(敬遠）していくの！？ 勝負を避けるな！」

        【2コマ目：承】
        登場人物： ようた
        描写： はなの背後から呆れたように覗き込む弟。
        吹き出し1:
          type: caption
          text: 「弟（元高校球児）」
        吹き出し2:
          type: normal
          character: ようた
          text: 「いいか姉ちゃん。ピッチャーが勝負を避けるのは、バッターから異常な『殺気』を感じた時だけだ。」
        吹き出し3:
          type: normal
          character: ようた
          text: 「自分の打席（メッセージ）、振り返ってみろ。」

        【3コマ目：転】
        登場人物： はな、ようた
        描写： はなが自分の送信履歴を見返す。冷や汗を流し、「あっ」と気づく瞬間。
        吹き出し1:
          type: shout
          character: はな
          text: 「えーっと、マッチング直後に『年収は？』『いつまでに結婚したい？』」
        吹き出し2:
          type: normal
          character: ようた
          text: 「えっ？何これ？」

        【4コマ目：結】
        登場人物： ようた、はな
        描写： 弟が全力でツッコミを入れる。はなは崩れ落ちる。
        吹き出し1:
          type: shout
          character: ようた
          text: 「初球からフルスイングしすぎだ！！ まずはバント（挨拶）から始めろ！！」
          highlight: フルスイング、バント（挨拶）
        吹き出し2:
          type: thought
          character: はな
          text: 「ガーン…」
      render: markdown
    validations:
      required: false
