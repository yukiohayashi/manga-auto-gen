name: 漫画生成リクエスト (手動実行用)
description: 広い入力欄を使って、4コマ漫画のシナリオやテーマを手動で指定します。
title: "[生成リクエスト]: "
labels: ["manga-generation"]
body:
  - type: input
    id: story_title
    attributes:
      label: 【必須】漫画のタイトル（Driveのフォルダ名になります）
      description: Google Driveの保存先フォルダ名として使用されます。
      placeholder: 例: 婚活スラッガー
    validations:
      required: true

  - type: textarea
    id: theme_prompt
    attributes:
      label: 【必須】本日のテーマやシナリオ指示
      description: どのようなお話にしたいか、ざっくりとしたテーマや指示を書いてください。複数行で記述可能です。
      placeholder: |
        例：マッチングアプリで男たちが敬遠していく主人公
        野球の例えで弟がツッコミを入れる展開
        主人公の極端なアプローチが原因だったというオチ
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: twist_pattern
    attributes:
      label: 【任意】どんでん返しパターンの指定
      description: PlotTwistガイドの法則から指定する場合は選択してください。
      options:
        - おまかせ（自動選択）
        - ドラキュラ2世 (D→D'継承)
        - ドラキュラの影 (D→D'誤認)
        - ドラウルフ (D→W)
        - ドラフランケン (D→F)
        - ウルフドラキュラ (W→D)
        - ウルフフランケン (W→F)
        - フランケンドラキュラ (F→D)
        - フランケンウルフ (F→W)
        - ゾンビ (∅→○)
        - ドラゴンの卵 (遠→近)
    validations:
      required: false

  - type: textarea
    id: scenario_detail
    attributes:
      label: 【任意】詳細シナリオ（4コマの起承転結を直接指定する場合）
      description: |
        練り上げた4コマの起承転結、セリフ、表情指定などがあればここにペーストしてください。
        枠の右下を引っ張ることで、さらに広くゆとりを持って表示できます。
      placeholder: |
        採用パターン：ドラフランケン（D→F）
        起点（D：ドラキュラ）： 男たちが勝負してくれない（アプリの男たちが悪い）という思い込み。
        どんでん返し先（F：フランケン）： 自分の極端なアプローチ（行動）が男たちを恐怖させていたという自業自得。

        【1コマ目：起】（外部の敵への怒り）
        登場人物： はな（怒り：表情5）
        描写： スマホを見てイライラしているはな。
        はなのセリフ（黄色・丸み禁止吹き出し）： なんで私とマッチングした男、すぐ『敬遠（フェードアウト）』していくの！？ 最近の男は勝負を避けすぎよ！

        【2コマ目：承】（弟による野球の例え・分析）
        登場人物： 弟（困惑：表情8 / または 通常：表情1）
        描写： はなの背後から呆れたように覗き込む弟。ここで紹介キャプションが入る。
        紹介テロップ（四角い枠）： 弟（元高校球児）
        弟のセリフ（パステルブルー吹き出し）： いいか姉ちゃん…。ピッチャーが勝負を避けるのは、バッターから異常な『殺気』を感じた時だけだ。自分の打席（メッセージ）、振り返ってみろ。

        【3コマ目：転】（真実の発見・Fへの転換）
        登場人物： はな（驚き：表情3 → 焦り）、弟（真顔でスマホを覗き込む）
        描写： はなが自分の送信履歴を見返す。冷や汗を流し、「あっ」と気づく瞬間。
        はなのセリフ（黄色吹き出し）： えーっと、マッチング直後に『年収は？』『いつまでに結婚したい？』って、初球からホームラン狙いでフルスイングしてるだけだけど……あっ。

        【4コマ目：結】（オチ・ツッコミ）
        登場人物： 弟（怒り：表情5）、はな（悲しみ：表情4 / 崩れ落ちる）
        描写： 弟が全力でツッコミを入れる。はなは自分の行動が原因だったことに気づき、真っ白になって崩れ落ちる。
        弟のセリフ（黄色・ギザギザ爆発ツッコミ吹き出し）： 初球からフルスイングしすぎだ！！ まずは**バント（挨拶）**から始めろ！！
        ※「フルスイング」「バント（挨拶）」を赤文字・特大サイズで強調
        はなのモノローグ（白・小声吹き出し）： 「三振どころかベンチに逃げられてたわ…」
      render: markdown
    validations:
      required: false
